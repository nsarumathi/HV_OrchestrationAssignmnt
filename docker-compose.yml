version: "3.9"

services:

  authservice:
    build:
      context: ./backend/authService
    image: hv-authservice:latest
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3001:3001"

  adminservice:
    build:
      context: ./backend
      dockerfile: adminService/Dockerfile
    image: hv-adminservice:latest
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3003:3003"

  chatservice:
    build:
       context: ./backend
       dockerfile: chatService/Dockerfile
    image: hv-chatservice:latest
    environment:
      PORT: 3004
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3004:3004"

  streamingservice:
    build:
      context: ./backend
      dockerfile: streamingService/Dockerfile
    image: hv-streamingservice:latest
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_CDN_URL: ${AWS_CDN_URL}
      STREAMING_PUBLIC_URL: ${STREAMING_PUBLIC_URL}
    ports:
      - "3002:3002"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_AUTH_URL: http://k8s-hvapp-authserv-988cdeec4a-61db9b66f7c5c00b.elb.ap-south-2.amazonaws.com:3001
      
        REACT_APP_ADMIN_URL: http://k8s-hvapp-adminser-08d387da5e-d417fb01b8a55463.elb.ap-south-2.amazonaws.com:3003
      
        REACT_APP_CHAT_URL: http://k8s-hvapp-chatserv-6d54ada556-3e6d4ae844e7538b.elb.ap-south-2.amazonaws.com:3004
      
        REACT_APP_STREAMING_URL: http://k8s-hvapp-streamin-22740a4e8a-9d9e87d5be4dcdfa.elb.ap-south-2.amazonaws.com:3002
    image: hv-frontend:latest
    depends_on:
      - authservice
      - adminservice
      - chatservice
      - streamingservice
    ports:
      - "3000:80"
