version: "3.9"

services:

  authservice:
    build:
      context: ./backend/authService
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3001:3001"

  streamingservice:
    build:
      context: ./backend/streamingService
    environment:
      PORT: 3004
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_CDN_URL: ${AWS_CDN_URL}
      STREAMING_PUBLIC_URL: ${STREAMING_PUBLIC_URL}
    ports:
      - "3004:3004"

  adminservice:
    build:
      context: ./backend/adminService
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3002:3002"

  chatservice:
    build:
      context: ./backend/chatService
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URLS: ${CLIENT_URLS}
    ports:
      - "3003:3003"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_AUTH_URL: http://localhost:3001
        REACT_APP_ADMIN_URL: http://localhost:3002
        REACT_APP_CHAT_URL: http://localhost:3003
        REACT_APP_STREAMING_URL: http://localhost:3004
    depends_on:
      - auth
      - streaming
      - admin
      - chat
    ports:
      - "3000:80"
